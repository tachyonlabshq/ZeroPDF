name: Platform Bundles

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-bundle:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm64
            runner: macos-15
            build_kind: native
            target: aarch64-apple-darwin
            binary_path: target/release/zeropdf
          - platform: macos-x64
            runner: macos-15-intel
            build_kind: native
            target: x86_64-apple-darwin
            binary_path: target/release/zeropdf
          - platform: windows-x64
            runner: ubuntu-latest
            build_kind: xwin
            target: x86_64-pc-windows-msvc
            binary_path: target/x86_64-pc-windows-msvc/release/zeropdf.exe
          - platform: windows-arm64
            runner: ubuntu-latest
            build_kind: xwin
            target: aarch64-pc-windows-msvc
            binary_path: target/aarch64-pc-windows-msvc/release/zeropdf.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set up cargo-xwin
        if: matrix.build_kind == 'xwin'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-xwin

      - name: Build native binary
        if: matrix.build_kind == 'native'
        run: cargo build --release

      - name: Build Windows binary with cargo-xwin
        if: matrix.build_kind == 'xwin'
        run: cargo xwin build --release --target ${{ matrix.target }}

      - name: Build install zip
        run: |
          python3 scripts/build_platform_bundle.py \
            --platform "${{ matrix.platform }}" \
            --binary-path "${{ matrix.binary_path }}" \
            --output-root dist/platform-bundles

      - name: Upload platform artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeropdf-${{ matrix.platform }}
          path: |
            dist/platform-bundles/*.zip
            dist/platform-bundles/*.manifest.json
            dist/platform-bundles/*.SHA256.txt
          if-no-files-found: error

  aggregate:
    name: Aggregate Release Assets
    runs-on: ubuntu-latest
    needs: build-bundle
    steps:
      - name: Download bundle artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/downloaded
          pattern: zeropdf-*
          merge-multiple: true

      - name: Build aggregate manifest and checksums
        run: |
          python3 - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          root = Path('dist/downloaded')
          manifests = []
          for manifest_path in sorted(root.glob('*.manifest.json')):
              manifests.append(json.loads(manifest_path.read_text(encoding='utf-8')))

          sha_lines = []
          for asset in sorted(root.glob('*.zip')):
              digest = hashlib.sha256(asset.read_bytes()).hexdigest()
              sha_lines.append(f"{digest}  {asset.name}")

          checksum_path = root / 'ZeroPDF-platform-bundles.SHA256SUMS.txt'
          checksum_path.write_text('\n'.join(sha_lines) + '\n', encoding='utf-8')

          summary = {
              'status': 'success',
              'bundle_count': len(manifests),
              'bundles': manifests,
              'checksum_file': checksum_path.name,
          }
          (root / 'ZeroPDF-platform-bundles.manifest.json').write_text(
              json.dumps(summary, indent=2) + '\n',
              encoding='utf-8',
          )
          PY

      - name: Upload aggregate artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeropdf-platform-bundles
          path: dist/downloaded/*
          if-no-files-found: error

      - name: Compute release metadata
        id: release_meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "tag_name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "release_name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "tag_name=latest" >> "$GITHUB_OUTPUT"
            echo "release_name=Latest Platform Bundles" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub release assets
        if: steps.release_meta.outputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          name: ${{ steps.release_meta.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ steps.release_meta.outputs.prerelease == 'true' }}
          files: |
            dist/downloaded/*.zip
            dist/downloaded/*.manifest.json
            dist/downloaded/*.SHA256.txt
            dist/downloaded/*.SHA256SUMS.txt
          fail_on_unmatched_files: true
